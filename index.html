<script>
  const CATEGORY_LIST = ["すべて", "料理・食", "パパ・育児", "AI・テクノロジー"];

  const BUSINESS_TAGS = [
    "すべて",
    "健康経営",
    "オンライン料理教室",
    "AI活用",
    "食育",
    "共食・家庭",
    "レシピ活用",
    "企業研修",
    "発信ネタ",
    "商品開発",
    "コミュニティ"
  ];

  let allArticles = [];
  let activeCategory = "すべて";
  let activeBusinessTag = "すべて";

  function escapeHtml(str = "") {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function normalizeArticle(article) {
    return {
      title: article.title || "",
      source: article.source || "不明",
      category: article.category || article.label || "未分類",
      subcategory: article.subcategory || "話題",
      summary: article.summary || "",
      business_tag_labels: Array.isArray(article.business_tag_labels) ? article.business_tag_labels : [],
      published: article.published || article.publishedAt || "",
      link: article.link || article.url || ""
    };
  }

  function getCategoryClass(category) {
    if (category === "料理・食") return "category-food";
    if (category === "パパ・育児") return "category-family";
    if (category === "AI・テクノロジー") return "category-ai";
    return "";
  }

  function setCategory(category) {
    activeCategory = category;
    buildCategoryTabs();
    renderAll();
  }

  function setBusinessTag(tag) {
    activeBusinessTag = tag;
    activeCategory = "すべて";
    buildCategoryTabs();
    buildBusinessFilters();
    renderAll();
  }

  function buildCategoryTabs() {
    const wrap = document.getElementById("categoryTabs");
    wrap.innerHTML = CATEGORY_LIST.map(cat => `
      <button class="tab ${cat === activeCategory ? "active" : ""}" onclick="setCategory('${cat}')">${cat}</button>
    `).join("");
  }

  function buildBusinessFilters() {
    const wrap = document.getElementById("businessFilters");
    wrap.innerHTML = BUSINESS_TAGS.map(tag => `
      <button class="filter-chip ${tag === activeBusinessTag ? "active" : ""}" onclick="setBusinessTag('${tag}')">${tag}</button>
    `).join("");
  }

  function normalizeBusinessLabels(article) {
    if (Array.isArray(article.business_tag_labels) && article.business_tag_labels.length > 0) {
      return article.business_tag_labels;
    }

    if (article.category === "AI・テクノロジー") {
      return ["AI活用", "発信ネタ", "食育"];
    }

    if (article.category === "料理・食") {
      return ["レシピ活用", "発信ネタ", "商品開発", "健康経営"];
    }

    if (article.category === "パパ・育児") {
      return ["共食・家庭", "食育", "発信ネタ", "コミュニティ"];
    }

    return ["発信ネタ"];
  }

  function filterArticles() {
    return allArticles.filter(article => {
      const labels = normalizeBusinessLabels(article);
      const categoryMatch = activeCategory === "すべて" || article.category === activeCategory;
      const businessMatch = activeBusinessTag === "すべて" || labels.includes(activeBusinessTag);
      return categoryMatch && businessMatch;
    });
  }

  function renderTopNews() {
    const topWrap = document.getElementById("topNews");
    const topItems = allArticles.slice(0, 3);

    topWrap.innerHTML = topItems.map(item => {
      const hasLink = item.link && item.link.trim() !== "";
      const titleHtml = hasLink
        ? `<a href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer" style="color:#fff;text-decoration:none;">${escapeHtml(item.title)}</a>`
        : `<span style="color:#fff;">${escapeHtml(item.title)}</span>`;

      return `
        <div class="mini-card">
          <div class="tag-group" style="margin-bottom:8px;">
            <span class="tag ${getCategoryClass(item.category)}">${escapeHtml(item.category)}</span>
            <span class="tag sub">${escapeHtml(item.subcategory || "話題")}</span>
          </div>
          <div class="mini-title">${titleHtml}</div>
          <div class="mini-text">${escapeHtml(item.summary || "")}</div>
        </div>
      `;
    }).join("");
  }

  function renderNewsList() {
    const list = document.getElementById("newsList");
    const filtered = filterArticles();

    document.getElementById("resultCount").textContent =
      `表示件数：${filtered.length}件 / 全${allArticles.length}件`;

    if (!filtered.length) {
      list.innerHTML = `<div class="empty">該当する記事がありません。カテゴリか事業タグを変更してください。</div>`;
      return;
    }

    list.innerHTML = filtered.map(item => {
      const labels = normalizeBusinessLabels(item);
      const hasLink = item.link && item.link.trim() !== "";

      const titleHtml = hasLink
        ? `<a href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title || "")}</a>`
        : `<span>${escapeHtml(item.title || "")}</span>`;

      const readLinkHtml = hasLink
        ? `<a class="read-link" href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer">記事を読む</a>`
        : `<span style="color:#6b7280;">リンクなし</span>`;

      return `
        <div class="card">
          <div class="row-top">
            <div class="tag-group">
              <span class="tag ${getCategoryClass(item.category)}">${escapeHtml(item.category || "")}</span>
              <span class="tag sub">${escapeHtml(item.subcategory || "話題")}</span>
            </div>
            <div class="source">${escapeHtml(item.source || "不明")}</div>
          </div>

          <div class="title">${titleHtml}</div>

          <div class="summary">${escapeHtml(item.summary || "")}</div>

          <div class="biz-row">
            ${labels.map(tag => `<span class="tag biz">${escapeHtml(tag)}</span>`).join("")}
          </div>

          <div class="meta-row">
            <div>${escapeHtml(item.published || "")}</div>
            <div>${readLinkHtml}</div>
          </div>
        </div>
      `;
    }).join("");
  }

  function renderAll() {
    renderNewsList();
  }

  async function init() {
    buildCategoryTabs();
    buildBusinessFilters();

    try {
      const res = await fetch("./news.json?ts=" + Date.now());
      const data = await res.json();

      allArticles = (data.articles || []).map(normalizeArticle);

      const updatedText = data.updated_at || data.updated || "不明";
      const countText = data.count || allArticles.length || 0;

      document.getElementById("updatedAt").textContent =
        `最終更新：${updatedText} / 記事数：${countText}件`;

      renderTopNews();
      renderAll();
    } catch (e) {
      document.getElementById("updatedAt").textContent = "news.json の読み込みに失敗しました。";
      document.getElementById("newsList").innerHTML =
        `<div class="empty">データの読み込みに失敗しました。news.json の配置と生成を確認してください。</div>`;
      console.error(e);
    }
  }

  init();
</script>
