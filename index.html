<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ビストロパパ朝ニュース</title>
  <style>
    body{
      margin:0;
      background:#050505;
      color:#ffffff;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      line-height:1.6;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px 16px 60px;
    }

    h1{
      margin:0 0 8px;
      color:#f59e0b;
      font-size:32px;
    }

    .lead{
      color:#d1d5db;
      margin-bottom:8px;
    }

    .meta{
      color:#9ca3af;
      font-size:14px;
      margin-bottom:24px;
    }

    .section-title{
      margin:28px 0 12px;
      color:#fbbf24;
      font-size:18px;
      font-weight:700;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:18px;
    }

    .tab, .filter-chip{
      border:1px solid #333;
      color:#fff;
      background:#111;
      padding:8px 12px;
      border-radius:999px;
      cursor:pointer;
      font-size:14px;
      transition:all .2s ease;
    }

    .tab:hover, .filter-chip:hover{
      border-color:#f59e0b;
      color:#f59e0b;
    }

    .tab.active, .filter-chip.active{
      background:#f59e0b;
      color:#111;
      border-color:#f59e0b;
      font-weight:700;
    }

    .top-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    @media(max-width:900px){
      .top-grid{
        grid-template-columns:1fr;
      }
    }

    .card{
      border:1px solid #2a2a2a;
      background:#0b0b0b;
      border-radius:16px;
      padding:16px;
      margin-bottom:14px;
      box-shadow:0 0 0 rgba(0,0,0,0);
    }

    .mini-card{
      border:1px solid #2a2a2a;
      background:#0b0b0b;
      border-radius:14px;
      padding:14px;
    }

    .row-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .tag-group{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:4px 10px;
      font-size:12px;
      font-weight:700;
      line-height:1.2;
      border:1px solid transparent;
      white-space:nowrap;
    }

    .tag.category-food{
      background:rgba(245,158,11,.16);
      color:#fbbf24;
      border-color:rgba(245,158,11,.35);
    }

    .tag.category-family{
      background:rgba(59,130,246,.16);
      color:#93c5fd;
      border-color:rgba(59,130,246,.35);
    }

    .tag.category-ai{
      background:rgba(16,185,129,.16);
      color:#6ee7b7;
      border-color:rgba(16,185,129,.35);
    }

    .tag.sub{
      background:#161616;
      color:#d1d5db;
      border-color:#2f2f2f;
    }

    .tag.biz{
      background:#1a1a1a;
      color:#fca5a5;
      border-color:#3b2a2a;
    }

    .source{
      color:#d1d5db;
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
    }

    .title{
      font-size:22px;
      font-weight:700;
      line-height:1.45;
      margin:6px 0 10px;
    }

    .title a{
      color:#fff;
      text-decoration:none;
    }

    .title a:hover{
      color:#f59e0b;
    }

    .summary{
      color:#d1d5db;
      font-size:15px;
      margin-bottom:12px;
    }

    .biz-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:10px 0 12px;
    }

    .meta-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      color:#9ca3af;
      font-size:13px;
      margin-top:8px;
    }

    .read-link{
      color:#fff;
      text-decoration:none;
      border-bottom:1px solid #555;
    }

    .read-link:hover{
      color:#f59e0b;
      border-color:#f59e0b;
    }

    .count{
      color:#9ca3af;
      margin:8px 0 20px;
      font-size:14px;
    }

    .empty{
      border:1px dashed #333;
      border-radius:14px;
      padding:20px;
      color:#9ca3af;
      text-align:center;
      margin-top:16px;
    }

    .mini-title{
      font-weight:700;
      margin-bottom:8px;
      color:#fff;
    }

    .mini-text{
      color:#d1d5db;
      font-size:14px;
    }

    .footer-note{
      color:#6b7280;
      font-size:12px;
      margin-top:24px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ビストロパパ朝ニュース</h1>
    <div class="lead">料理・育児・AIのニュースを、ビストロパパの事業ネタとして拾うためのニュースプラウザー</div>
    <div class="meta" id="updatedAt">更新日時を読み込み中...</div>

    <div class="section-title">今日の注目3本</div>
    <div class="top-grid" id="topNews"></div>

    <div class="section-title">カテゴリ</div>
    <div class="toolbar" id="categoryTabs"></div>

    <div class="section-title">ビストロパパ事業タグ</div>
    <div class="toolbar" id="businessFilters"></div>

    <div class="count" id="resultCount"></div>

    <div id="newsList"></div>

    <div class="footer-note">
      ニュースソースはGoogle News RSSをもとに取得しています。表示内容は記事タイトル・説明文ベースの簡易要約です。
    </div>
  </div>

  <script>
    const CATEGORY_LIST = ["すべて", "料理・食", "パパ・育児", "AI・テクノロジー"];

    const BUSINESS_TAGS = [
      "すべて",
      "健康経営",
      "オンライン料理教室",
      "AI活用",
      "食育",
      "共食・家庭",
      "レシピ活用",
      "企業研修",
      "発信ネタ",
      "商品開発",
      "コミュニティ"
    ];

    let allArticles = [];
    let activeCategory = "すべて";
    let activeBusinessTag = "すべて";

    function escapeHtml(str = "") {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getCategoryClass(category) {
      if (category === "料理・食") return "category-food";
      if (category === "パパ・育児") return "category-family";
      if (category === "AI・テクノロジー") return "category-ai";
      return "";
    }

    function buildCategoryTabs() {
      const wrap = document.getElementById("categoryTabs");
      wrap.innerHTML = CATEGORY_LIST.map(cat => `
        <button class="tab ${cat === activeCategory ? "active" : ""}" onclick="setCategory('${cat}')">${cat}</button>
      `).join("");
    }

    function buildBusinessFilters() {
      const wrap = document.getElementById("businessFilters");
      wrap.innerHTML = BUSINESS_TAGS.map(tag => `
        <button class="filter-chip ${tag === activeBusinessTag ? "active" : ""}" onclick="setBusinessTag('${tag}')">${tag}</button>
      `).join("");
    }

    function setCategory(category) {
      activeCategory = category;
      buildCategoryTabs();
      renderAll();
    }

    function setBusinessTag(tag) {
      activeBusinessTag = tag;
      buildBusinessFilters();
      renderAll();
    }

    function filterArticles() {
      return allArticles.filter(article => {
        const categoryMatch = activeCategory === "すべて" || article.category === activeCategory;
        const businessMatch =
          activeBusinessTag === "すべて" ||
          (article.business_tag_labels || []).includes(activeBusinessTag);
        return categoryMatch && businessMatch;
      });
    }

    function renderTopNews() {
      const topWrap = document.getElementById("topNews");
      const topItems = allArticles.slice(0, 3);

      topWrap.innerHTML = topItems.map(item => `
        <div class="mini-card">
          <div class="tag-group" style="margin-bottom:8px;">
            <span class="tag ${getCategoryClass(item.category)}">${escapeHtml(item.category)}</span>
            <span class="tag sub">${escapeHtml(item.subcategory || "話題")}</span>
          </div>
          <div class="mini-title">
            <a href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer" style="color:#fff;text-decoration:none;">
              ${escapeHtml(item.title)}
            </a>
          </div>
          <div class="mini-text">${escapeHtml(item.summary || "")}</div>
        </div>
      `).join("");
    }

    function renderNewsList() {
      const list = document.getElementById("newsList");
      const filtered = filterArticles();

      document.getElementById("resultCount").textContent =
        `表示件数：${filtered.length}件 / 全${allArticles.length}件`;

      if (!filtered.length) {
        list.innerHTML = `<div class="empty">該当する記事がありません。カテゴリか事業タグを変更してください。</div>`;
        return;
      }

      list.innerHTML = filtered.map(item => `
        <div class="card">
          <div class="row-top">
            <div class="tag-group">
              <span class="tag ${getCategoryClass(item.category)}">${escapeHtml(item.category || "")}</span>
              <span class="tag sub">${escapeHtml(item.subcategory || "話題")}</span>
            </div>
            <div class="source">${escapeHtml(item.source || "不明")}</div>
          </div>

          <div class="title">
            <a href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer">
              ${escapeHtml(item.title || "")}
            </a>
          </div>

          <div class="summary">${escapeHtml(item.summary || "")}</div>

          ${
            item.business_tag_labels && item.business_tag_labels.length
              ? `<div class="biz-row">
                  ${item.business_tag_labels.map(tag => `
                    <span class="tag biz">${escapeHtml(tag)}</span>
                  `).join("")}
                 </div>`
              : ``
          }

          <div class="meta-row">
            <div>${escapeHtml(item.published || "")}</div>
            <div>
              <a class="read-link" href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer">記事を読む</a>
            </div>
          </div>
        </div>
      `).join("");
    }

    function renderAll() {
      renderNewsList();
    }

    async function init() {
      buildCategoryTabs();
      buildBusinessFilters();

      try {
        const res = await fetch("./news.json?ts=" + Date.now());
        const data = await res.json();

        allArticles = data.articles || [];

        document.getElementById("updatedAt").textContent =
          `最終更新：${data.updated_at || "不明"} / 記事数：${data.count || 0}件`;

        renderTopNews();
        renderAll();
      } catch (e) {
        document.getElementById("updatedAt").textContent = "news.json の読み込みに失敗しました。";
        document.getElementById("newsList").innerHTML =
          `<div class="empty">データの読み込みに失敗しました。news.json の配置と生成を確認してください。</div>`;
        console.error(e);
      }
    }

    init();
  </script>
</body>
</html>
