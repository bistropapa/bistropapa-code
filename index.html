<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ビストロパパ朝ニュース</title>

<style>
body{
  margin:0;
  background:#050505;
  color:#fff;
  font-family:sans-serif;
}
.wrap{max-width:1200px;margin:auto;padding:20px;}
h1{color:#f59e0b;}
.section-title{margin-top:30px;color:#fbbf24;font-size:20px;}
.card{
  border:1px solid #333;
  padding:16px;
  margin-bottom:10px;
  border-radius:10px;
}
.top-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.tab{margin-right:10px;padding:8px 12px;cursor:pointer;}
.active{background:#f59e0b;color:#000;}
</style>
</head>

<body>
<div class="wrap">

<h1>ビストロパパ朝ニュース</h1>

<div class="section-title">🧠 今日のひとこと</div>
<div id="comment-box" class="card"></div>

<div class="section-title">🔥 今日の注目3本</div>
<div id="top-news" class="top-grid"></div>

<div class="section-title">✏️ 今日のnoteネタ</div>
<div id="idea-box" class="card"></div>

<div>
<button class="tab active" data-label="料理・食">料理・食</button>
<button class="tab" data-label="パパ・育児">パパ・育児</button>
<button class="tab" data-label="AI・テクノロジー">AI・テクノロジー</button>
</div>

<div class="section-title" id="current-label">料理・食</div>
<div id="news-root"></div>

</div>

<script>
let NEWS_DATA=[];
let CURRENT="料理・食";

function renderComment(){
  if(!NEWS_DATA.length)return;
  const t=NEWS_DATA[0].title;
  document.getElementById("comment-box").innerText=
  `今日の注目は「${t}」。この流れは家庭料理やライフスタイルにも影響しそうです。`;
}

function renderTop(){
  const top=NEWS_DATA.slice(0,3);
  document.getElementById("top-news").innerHTML=
    top.map(n=>`<div class="card"><a href="${n.url}" target="_blank">${n.title}</a></div>`).join("");
}

function renderIdeas(){
  const ideas=NEWS_DATA.slice(0,5).map(n=>"・"+n.title).join("\n");
  document.getElementById("idea-box").innerText=ideas;
}

function renderList(label){
  CURRENT=label;
  document.getElementById("current-label").innerText=label;

  document.querySelectorAll(".tab").forEach(b=>{
    b.classList.toggle("active",b.dataset.label===label);
  });

  const list=NEWS_DATA.filter(n=>n.label===label);
  document.getElementById("news-root").innerHTML=
    list.map(n=>`<div class="card">
      <a href="${n.url}" target="_blank">${n.title}</a>
    </div>`).join("");
}

async function load(){
  const res=await fetch("./news.json?"+Date.now());
  const data=await res.json();
  NEWS_DATA=data.articles||[];

  renderComment();
  renderTop();
  renderIdeas();
  renderList(CURRENT);
}

document.querySelectorAll(".tab").forEach(b=>{
  b.onclick=()=>renderList(b.dataset.label);
});

load();
</script>
</body>
</html>
a {
  color: #ffffff;
  text-decoration: none;
}

a:hover {
  color: #fbbf24;
}
