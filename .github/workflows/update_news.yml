name: Update News Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"  # 毎朝7時（日本時間）

jobs:
  update-news:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run script
        run: python scripts/fetch_news.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add news.json
          git commit -m "Update news.json" || echo "No changes"
          git push
