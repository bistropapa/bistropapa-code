name: Update News Daily

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Fetch news and generate news.json
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          cat > fetch_news.py << 'PYEOF'
          import urllib.request
          import json
          import os
          from datetime import datetime, timezone, timedelta

          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST).strftime('%Y年%m月%d日 %H:%M')
          api_key = os.environ.get('NEWS_API_KEY', '')
          url = 'https://newsapi.org/v2/top-headlines?country=jp&pageSize=10&apiKey=' + api_key

          try:
              with urllib.request.urlopen(url, timeout=10) as res:
                  data = json.loads(res.read())
              articles = []
              for a in data.get('articles', []):
                  if not a.get('title') or a['title'] == '[Removed]':
                      continue
                  articles.append({
                      'title': a['title'],
                      'description': a.get('description') or a['title'],
                      'url': a.get('url', '#'),
                      'source': a.get('source', {}).get('name', 'ニュース')
                  })
              output = {'updated': now, 'articles': articles[:8]}
          except Exception as e:
              output = {
                  'updated': now,
                  'articles': [{'title': 'ニュース取得に失敗しました', 'description': str(e), 'url': '#', 'source': 'エラー'}]
              }

          with open('news.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
          print('news.json updated:', now)
          PYEOF
          python3 fetch_news.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "Update news $(date '+%Y-%m-%d %H:%M')"
          git push
